name: Deploy to Tomcat

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-tomcat-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build WAR
        run: mvn -DskipTests package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bosung-war
          path: target/bosung-app.war

  deploy:
    needs: build
    # Internal host usually requires a runner inside private network.
    runs-on: [self-hosted, linux]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bosung-war
          path: ./artifact

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_CONTENT='${{ secrets.SSH_PRIVATE_KEY }}'
          # Handle both true multi-line keys and keys stored with escaped \n.
          if printf '%s' "$KEY_CONTENT" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
          else
            printf '%b' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          ssh-keyscan -H "${{ secrets.WLS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload WAR and deploy script
        shell: bash
        run: |
          set -euo pipefail
          REMOTE="${{ secrets.WLS_USER }}@${{ secrets.WLS_HOST }}"
          ssh -o BatchMode=yes -i ~/.ssh/id_rsa "$REMOTE" "mkdir -p '${{ secrets.REMOTE_DEPLOY_DIR }}'"
          scp -o BatchMode=yes -i ~/.ssh/id_rsa ./artifact/bosung-app.war "$REMOTE:${{ secrets.REMOTE_WAR_PATH }}"
          scp -o BatchMode=yes -i ~/.ssh/id_rsa ./deploy/deploy_remote_tomcat.sh "$REMOTE:${{ secrets.REMOTE_DEPLOY_SCRIPT_PATH }}"
          ssh -o BatchMode=yes -i ~/.ssh/id_rsa "$REMOTE" "chmod +x '${{ secrets.REMOTE_DEPLOY_SCRIPT_PATH }}'"

      - name: Debug remote files and paths
        shell: bash
        run: |
          set -euo pipefail
          REMOTE="${{ secrets.WLS_USER }}@${{ secrets.WLS_HOST }}"
          ssh -o BatchMode=yes -i ~/.ssh/id_rsa "$REMOTE" \
            "set -e; \
             ls -ld '${{ secrets.REMOTE_DEPLOY_DIR }}'; \
             ls -l '${{ secrets.REMOTE_DEPLOY_SCRIPT_PATH }}'; \
             ls -l '${{ secrets.REMOTE_WAR_PATH }}'; \
             test -d '${{ secrets.TOMCAT_WEBAPPS_DIR }}'; \
             echo '[debug] TOMCAT_WEBAPPS_DIR exists: ${{ secrets.TOMCAT_WEBAPPS_DIR }}'"

      - name: Execute remote Tomcat deploy
        shell: bash
        run: |
          set -euo pipefail
          REMOTE="${{ secrets.WLS_USER }}@${{ secrets.WLS_HOST }}"
          ssh -o BatchMode=yes -i ~/.ssh/id_rsa "$REMOTE" \
            "bash -x '${{ secrets.REMOTE_DEPLOY_SCRIPT_PATH }}' \
            '${{ secrets.REMOTE_WAR_PATH }}' \
            '${{ secrets.TOMCAT_WEBAPPS_DIR }}' \
            '${{ secrets.APP_CONTEXT_NAME }}'"
