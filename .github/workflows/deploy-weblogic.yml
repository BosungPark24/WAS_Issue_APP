name: Deploy to WebLogic

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-weblogic-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build WAR
        run: mvn -DskipTests package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bosung-war
          path: target/bosung-app.war

  deploy:
    needs: build
    # Internal WebLogic host usually requires a runner inside private network.
    runs-on: [self-hosted, linux]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bosung-war
          path: ./artifact

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.WLS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload WAR and deploy script
        shell: bash
        run: |
          set -euo pipefail
          REMOTE="${{ secrets.WLS_USER }}@${{ secrets.WLS_HOST }}"
          ssh -i ~/.ssh/id_rsa "$REMOTE" "mkdir -p '${{ secrets.REMOTE_DEPLOY_DIR }}'"
          scp -i ~/.ssh/id_rsa ./artifact/bosung-app.war "$REMOTE:${{ secrets.REMOTE_WAR_PATH }}"
          scp -i ~/.ssh/id_rsa ./deploy/deploy_remote.sh "$REMOTE:${{ secrets.REMOTE_DEPLOY_SCRIPT_PATH }}"
          ssh -i ~/.ssh/id_rsa "$REMOTE" "chmod +x '${{ secrets.REMOTE_DEPLOY_SCRIPT_PATH }}'"

      - name: Execute remote WebLogic deploy
        shell: bash
        run: |
          set -euo pipefail
          REMOTE="${{ secrets.WLS_USER }}@${{ secrets.WLS_HOST }}"
          ssh -i ~/.ssh/id_rsa "$REMOTE" \
            "bash '${{ secrets.REMOTE_DEPLOY_SCRIPT_PATH }}' \
            '${{ secrets.DOMAIN_HOME }}' \
            '${{ secrets.ADMIN_URL }}' \
            '${{ secrets.APP_NAME }}' \
            '${{ secrets.TARGET_NAME }}' \
            '${{ secrets.REMOTE_WAR_PATH }}' \
            '${{ secrets.WLS_USER_CONFIG_FILE }}' \
            '${{ secrets.WLS_USER_KEY_FILE }}'"
